<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Kenny Shop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .navbar { background: #f68b1e; padding: 12px 20px; }
        .navbar h1 { color: white; font-size: 24px; }
        .container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 4px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: 20px; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f68b1e; }
        label { display: block; color: #555; margin-bottom: 5px; font-size: 14px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 15px; margin-bottom: 15px; }
        input:focus { outline: none; border-color: #f68b1e; }
        .total { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #f68b1e; padding: 15px 0; border-top: 2px solid #eee; }
        .pay-btn { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .pay-btn:hover { background: #219a52; }
        .secure { text-align: center; color: #999; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🛍️ Kenny Shop - Checkout</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2>📦 Delivery Information</h2>
            <form method="POST">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
                <label>Delivery Address</label>
                <input type="text" placeholder="Enter your address" required>
                <label>City</label>
                <input type="text" placeholder="Enter your city" required>
                <label>State</label>
                <input type="text" placeholder="Enter your state" required>
                <div class="total">
                    <span>Total to Pay:</span>
                    <span>${{ total }}</span>
                </div>
                <button class="pay-btn" type="submit">✅ PLACE ORDER - ${{ total }}</button>
                <div class="secure">🔒 Secure Checkout | Free Delivery on all orders</div>
            </form>
        </div>
    </div>
</body>
</html>
